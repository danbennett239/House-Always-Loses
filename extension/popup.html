<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      padding: 16px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid #2a2a2a;
    }

    .logo { font-size: 18px; color: #d4af37; }

    .title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #d4af37;
    }

    .section-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #666;
      margin-bottom: 8px;
    }

    .url-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
      max-height: 180px;
      overflow-y: auto;
    }

    .url-item {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #242424;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 7px 10px;
    }

    .url-text {
      flex: 1;
      font-size: 12px;
      color: #ccc;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .remove-btn {
      background: none;
      border: none;
      color: #555;
      font-size: 16px;
      cursor: pointer;
      line-height: 1;
      padding: 0 2px;
      flex-shrink: 0;
      transition: color 0.15s;
    }
    .remove-btn:hover { color: #e05252; }

    .empty {
      font-size: 12px;
      color: #555;
      text-align: center;
      padding: 16px 0;
    }

    .add-row {
      display: flex;
      gap: 8px;
    }

    .url-input {
      flex: 1;
      background: #242424;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 10px;
      color: #e0e0e0;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    .url-input:focus { border-color: #d4af37; }
    .url-input::placeholder { color: #555; }

    .add-btn {
      background: #d4af37;
      border: none;
      border-radius: 8px;
      color: #111;
      font-size: 12px;
      font-weight: 700;
      padding: 8px 14px;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.15s;
    }
    .add-btn:hover { opacity: 0.85; }

    .error {
      font-size: 11px;
      color: #e05252;
      margin-top: 6px;
      min-height: 16px;
    }

    .note {
      font-size: 10px;
      color: #444;
      margin-top: 14px;
      line-height: 1.5;
      border-top: 1px solid #2a2a2a;
      padding-top: 10px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="logo">⚠︎</span>
    <span class="title">Reality Check</span>
  </div>

  <p class="section-label">Monitoring these sites</p>
  <div class="url-list" id="url-list"></div>

  <p class="section-label" style="margin-top:14px">Add a website to monitor</p>
  <div class="add-row">
    <input
      class="url-input"
      id="url-input"
      type="text"
      placeholder="https://www.bet365.com"
      spellcheck="false"
    />
    <button class="add-btn" id="add-btn">Add</button>
  </div>
  <p class="error" id="error"></p>

  <p class="note">
    The overlay appears on sites that emit Reality Check spin data.
  </p>

  <script src="popup.js"></script>
</body>
</html>
